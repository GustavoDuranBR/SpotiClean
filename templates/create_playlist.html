{% extends "base.html" %}

{% block title %}Criar Playlist - SpotiClean{% endblock %}

{% block content %}
<main class="container mt-5 pt-5">
    <h1 class="text-center mb-4">Criar Playlist</h1>
    <form method="POST" id="playlist-form" class="bg-dark p-4 rounded shadow">
        <div class="form-group mb-3">
            <label for="playlist_name" class="form-label text-white">Nome da Playlist</label>
            <input type="text" id="playlist_name" class="form-control" name="playlist_name" placeholder="Ex: Melhores do Rock" required>
        </div>

        <div class="form-group mb-3">
            <label for="artist_name" class="form-label text-white">Nome do Artista</label>
            <input type="text" id="artist_name" class="form-control" name="artist_name" placeholder="Ex: Metallica">
        </div>

        <div class="button-container d-flex justify-content-center gap-3 mb-3">
            <button type="button" id="add-artist-btn" class="btn btn-primary mr-2">Adicionar Artista</button>
            <button type="submit" id="create-playlist-btn" class="btn btn-success">Criar Playlist</button>
        </div>

        <div id="artist-list" class="mt-3 text-white"></div>

        <input type="hidden" id="artist_names" name="artist_names" required>
    </form>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const artistInput = document.getElementById('artist_name');
        const artistListDiv = document.getElementById('artist-list');
        const hiddenArtistNamesInput = document.getElementById('artist_names');
        const addArtistBtn = document.getElementById('add-artist-btn');
        const playlistForm = document.getElementById('playlist-form');

        // Impede que a tecla Enter envie o formulário acidentalmente ao digitar o artista
        artistInput.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Impede o envio do form
                addArtistBtn.click();   // Simula o clique no botão de adicionar
            }
        });

        let artistNames = [];

        // Função para adicionar o artista
        addArtistBtn.addEventListener('click', function () {
            const artistName = artistInput.value.trim();

            if (artistName !== "") {
                artistNames.push(artistName);
                updateArtistList();
                artistInput.value = "";
            } else {
                alert("Por favor, insira um nome de artista.");
            }
        });

        function updateArtistList() {
            hiddenArtistNamesInput.value = artistNames.join(',');
            artistListDiv.innerHTML = '';

            artistNames.forEach(function (artist, index) {
                const artistItem = document.createElement('div');
                artistItem.classList.add('artist-item', 'd-flex', 'justify-content-between', 'align-items-center', 'mb-2', 'p-2', 'border', 'border-secondary', 'rounded');
                
                const artistName = document.createElement('span');
                artistName.classList.add('text-light');
                artistName.textContent = `${index + 1}. ${artist}`;
                artistItem.appendChild(artistName);

                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
                removeBtn.classList.add('remove-artist-btn', 'btn', 'btn-danger', 'btn-sm', 'ml-2');
                removeBtn.setAttribute('aria-label', 'Remover artista');
                removeBtn.addEventListener('click', function() {
                    removeArtist(index);
                });

                artistItem.appendChild(removeBtn);
                artistListDiv.appendChild(artistItem);
            });
        }

        function removeArtist(index) {
            artistNames.splice(index, 1);
            updateArtistList();
        }

        playlistForm.addEventListener('submit', function (event) {
            if (artistNames.length === 0) {
                event.preventDefault();
                alert("Por favor, adicione pelo menos um artista à playlist.");
            }
        });
    });
</script>
{% endblock %}
