{% extends "base.html" %}

{% block title %}Logout - SpotiClean{% endblock %}

{% block content %}
<main class="container mt-5 pt-5 text-center">
    <div class="logout-wrapper bg-dark p-5 rounded shadow d-inline-block">
        <h1 class="text-light">Você está prestes a desconectar</h1>
        <p class="text-light mt-3">Obrigado por usar o SpotiClean. Você pode fazer login novamente a qualquer momento.</p>

        <form action="{{ url_for('logout') }}" method="post" class="mt-4">
            <button type="submit" class="btn btn-danger btn-lg mr-2" aria-label="Desconectar do Spotify">
                <i class="fas fa-sign-out-alt mr-2"></i>Confirmar Logout
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-lg" aria-label="Voltar">Cancelar</a>
        </form>
    </div>
</main>
{% endblock %}
